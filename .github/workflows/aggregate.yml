name: Daily PM Aggregator

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      max_items:
        description: 'Max articles per source'
        required: false
        default: '2'
      openrouter_model:
        description: 'OpenRouter model (e.g. openrouter/auto, z-ai/glm-4.5-air:free)'
        required: false
        default: 'z-ai/glm-4.5-air:free'

jobs:
  aggregate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run aggregator
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MAX_ITEMS_PER_FEED: ${{ github.event.inputs.max_items || '2' }}
          OPENROUTER_MODEL: ${{ github.event.inputs.openrouter_model || 'z-ai/glm-4.5-air:free' }}
        run: python scripts/aggregate.py

      - name: Commit and push data.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update content"
          file_pattern: data.json
          skip_fetch: false
          push_options: '--force-with-lease'
          commit_user_name: TheSharpPM
          commit_user_email: thesharppm@gmail.com
          commit_author: TheSharpPM <thesharppm@gmail.com>
