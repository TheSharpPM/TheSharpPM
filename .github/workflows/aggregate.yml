name: Daily PM Aggregator

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  aggregate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install feedparser requests

      - name: Correr aggregator
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python scripts/aggregate.py

      - name: Commit e push do data.json
        run: |
          git config --global user.name "TheSharpPM Bot"
          git config --global user.email "bot@thesharppm.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: atualizar conteúdo $(date +'%Y-%m-%d')"
          git push origin main
