name: Daily PM Aggregator

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      max_items:
        description: 'Max articles per source'
        required: false
        default: '2'
      openrouter_model:
        description: 'OpenRouter model (e.g. openrouter/auto, google/gemma-3-27b-it:free)'
        required: false
        default: 'google/gemma-3-27b-it:free'

jobs:
  aggregate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install feedparser requests

      - name: Correr aggregator
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MAX_ITEMS_PER_FEED: ${{ github.event.inputs.max_items || '2' }}
          OPENROUTER_MODEL: ${{ github.event.inputs.openrouter_model || 'google/gemma-3-27b-it:free' }}
        run: python scripts/aggregate.py

      - name: Commit e push do data.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: atualizar conteúdo"
          file_pattern: data.json
          skip_fetch: false
          push_options: '--force-with-lease'
