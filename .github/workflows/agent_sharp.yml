name: Agent Sharp Weekly

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests groq

      - name: Run Agent Sharp
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python scripts/agent_sharp.py

      - name: Commit and push edition
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "content: new Agent Sharp edition"
          file_pattern: "agent/**"
          skip_fetch: false
          push_options: '--force-with-lease'
