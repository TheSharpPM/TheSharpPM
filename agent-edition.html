<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-P5RKML0BZJ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-P5RKML0BZJ');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Sharp - Edition - The Sharp PM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0f0e0d;
            --paper: #f5f2ed;
            --accent: #c8391a;
            --muted: #8a8278;
            --card: #ffffff;
            --border: #e0dbd4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--paper);
            color: var(--ink);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            line-height: 1.6;
        }

        header {
            border-bottom: 2px solid var(--ink);
            padding: 0 2rem;
            background: var(--paper);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 0;
        }

        .logo { text-decoration: none; display: flex; align-items: center; }
        .logo img { height: 36px; width: auto; }

        .header-right { display: flex; align-items: center; gap: 1.5rem; }

        .nav-link {
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            transition: color 0.15s;
        }

        .nav-link:hover { color: var(--ink); }
        .nav-link.active { color: var(--ink); }
        .nav-link.active::after {
            content: '';
            display: block;
            height: 2px;
            background: var(--accent);
            margin-top: 2px;
        }

        .edition-meta {
            max-width: 720px;
            margin: 0 auto;
            padding: 3rem 2rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .edition-meta-date {
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .edition-meta-back {
            font-size: 0.75rem;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: 0.05em;
        }

        .edition-meta-back:hover { text-decoration: underline; }

        article {
            max-width: 720px;
            margin: 0 auto;
            padding: 1rem 2rem 4rem;
        }

        .edition-headline-main {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2rem, 5vw, 3.25rem);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 2rem;
            color: var(--ink);
        }

        .editorial {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            line-height: 1.7;
            color: var(--ink);
            margin-bottom: 3rem;
            padding-bottom: 2.5rem;
            border-bottom: 1px solid var(--border);
        }

        .editorial p { margin-bottom: 1rem; }
        .editorial p:last-child { margin-bottom: 0; }

        .section-label {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        .key-takeaways-wrap {
            background: var(--card);
            border-left: 3px solid var(--accent);
            padding: 1.5rem 1.75rem;
            margin-bottom: 3rem;
        }

        .key-takeaways-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .key-takeaways-list li {
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--ink);
        }

        .key-takeaways-list li:last-child { border-bottom: none; }

        .key-takeaways-list li::before {
            content: '—';
            color: var(--accent);
            margin-right: 0.5rem;
            font-weight: 700;
        }

        .must-reads-wrap { margin-bottom: 3rem; }

        .must-read-pull-quote {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.05rem;
            line-height: 1.5;
            color: var(--ink);
            border-left: 2px solid var(--accent);
            padding: 0.5rem 0 0.5rem 1rem;
            margin: 0.75rem 0;
        }

        .must-read {
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--border);
        }

        .must-read:last-child { border-bottom: none; }

        .must-read-source {
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .must-read h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 0.75rem;
        }

        .must-read h3 a { color: var(--ink); text-decoration: none; }
        .must-read h3 a:hover { color: var(--accent); }

        .must-read-why {
            font-size: 0.95rem;
            color: #4a4540;
            line-height: 1.6;
            margin-bottom: 0.75rem;
        }

        .must-read-link {
            font-size: 0.8rem;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: 0.03em;
        }

        .must-read-link:hover { text-decoration: underline; }

        .contrarian {
            background: var(--ink);
            color: var(--paper);
            padding: 2rem;
            margin-bottom: 3rem;
            border-radius: 2px;
        }

        .contrarian .section-label { color: var(--accent); }

        .contrarian h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            margin-bottom: 0.75rem;
            line-height: 1.3;
        }

        .contrarian h3 a { color: var(--paper); text-decoration: none; }
        .contrarian h3 a:hover { color: var(--accent); }

        .contrarian-source {
            font-size: 0.7rem;
            color: #c0b8ae;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
        }

        .contrarian-note {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #c0b8ae;
        }

        .also-worth-wrap { margin-bottom: 2rem; }

        .also-worth-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .also-worth-item {
            padding: 1rem 1.25rem;
            border: 1px solid var(--border);
            background: var(--card);
            border-radius: 2px;
            transition: border-color 0.15s;
        }

        .also-worth-item:hover { border-color: var(--accent); }

        .also-worth-item a {
            color: var(--ink);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .also-worth-item a:hover { color: var(--accent); }

        .also-worth-source {
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-top: 0.35rem;
        }

        .pm-homework-wrap {
            background: var(--ink);
            color: var(--paper);
            padding: 2rem;
            margin-bottom: 3rem;
            border-radius: 2px;
        }

        .pm-homework-wrap .section-label { color: var(--accent); }

        .pm-homework-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .pm-homework-list li {
            padding: 0.75rem 0;
            border-bottom: 1px solid #2a2826;
            font-size: 1rem;
            line-height: 1.5;
            color: var(--paper);
        }

        .pm-homework-list li:last-child { border-bottom: none; }

        .pm-homework-list li::before {
            content: '☐ ';
            color: var(--accent);
            margin-right: 0.5rem;
            font-weight: 700;
        }

        .edition-footer {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--muted);
            text-align: center;
            letter-spacing: 0.03em;
        }

        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--muted);
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        footer {
            border-top: 2px solid var(--ink);
            padding: 2rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--muted);
        }

        footer a { color: var(--accent); text-decoration: none; }

        @media (max-width: 600px) {
            article, .edition-meta { padding-left: 1.5rem; padding-right: 1.5rem; }
            .header-right { gap: 1rem; }
            .contrarian { padding: 1.5rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <a href="index.html" class="logo">
            <img src="The_Sharp_PM_Header3.png" alt="The Sharp PM">
        </a>
        <div class="header-right">
            <a href="index.html" class="nav-link">Daily Digest</a>
            <a href="agent.html" class="nav-link active">Agent Sharp</a>
            <a href="about.html" class="nav-link">About</a>
        </div>
    </div>
</header>

<div class="edition-meta">
    <span class="edition-meta-date" id="edition-date"></span>
    <a class="edition-meta-back" href="agent.html">&larr; All editions</a>
</div>

<article id="edition-content">
    <div class="loading">Loading edition...</div>
</article>

<footer>
    <p>The Sharp PM - Editorial by AI agent - <a href="https://github.com/TheSharpPM/TheSharpPM" target="_blank">GitHub</a></p>
</footer>

<script>
    var params = new URLSearchParams(window.location.search);
    var date = params.get('date');

    function formatDate(s, long) {
        if (!s) return '';
        var d = new Date(s);
        return d.toLocaleDateString('en-US', long
            ? { day: 'numeric', month: 'long', year: 'numeric' }
            : { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function escapeHtml(s) {
        return String(s || '').replace(/[&<>"']/g, function(c) {
            return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
        });
    }

    function renderEditorial(text) {
        var parts = (text || '').split(/\n\s*\n/).filter(function(p) { return p.trim(); });
        return parts.map(function(p) { return '<p>' + escapeHtml(p.trim()) + '</p>'; }).join('');
    }

    if (!date) {
        document.getElementById('edition-content').innerHTML = '<div class="loading">No edition specified.</div>';
    } else {
        document.getElementById('edition-date').textContent = formatDate(date, true);
        fetch('agent/' + encodeURIComponent(date) + '.json')
            .then(function(r) {
                if (!r.ok) throw new Error('not found');
                return r.json();
            })
            .then(function(e) {
                var html = '';
                html += '<h1 class="edition-headline-main">' + escapeHtml(e.headline_theme) + '</h1>';
                html += '<div class="editorial">' + renderEditorial(e.editorial) + '</div>';

                if (e.key_takeaways && e.key_takeaways.length) {
                    html += '<div class="key-takeaways-wrap">';
                    html += '<p class="section-label">Key takeaways</p>';
                    html += '<ul class="key-takeaways-list">';
                    e.key_takeaways.forEach(function(kt) {
                        html += '<li>' + escapeHtml(kt) + '</li>';
                    });
                    html += '</ul>';
                    html += '</div>';
                }

                if (e.must_reads && e.must_reads.length) {
                    html += '<div class="must-reads-wrap">';
                    html += '<p class="section-label">Must reads</p>';
                    e.must_reads.forEach(function(mr) {
                        html += '<div class="must-read">';
                        if (mr.source) html += '<div class="must-read-source">' + escapeHtml(mr.source) + '</div>';
                        html += '<h3><a href="' + escapeHtml(mr.url) + '" target="_blank" rel="noopener">' + escapeHtml(mr.title) + '</a></h3>';
                        if (mr.why) html += '<p class="must-read-why">' + escapeHtml(mr.why) + '</p>';
                        if (mr.pull_quote) html += '<blockquote class="must-read-pull-quote">' + escapeHtml(mr.pull_quote) + '</blockquote>';
                        html += '<a class="must-read-link" href="' + escapeHtml(mr.url) + '" target="_blank" rel="noopener">Read &rarr;</a>';
                        html += '</div>';
                    });
                    html += '</div>';
                }

                if (e.contrarian && e.contrarian.title) {
                    html += '<div class="contrarian">';
                    html += '<p class="section-label">The contrarian</p>';
                    if (e.contrarian.source) html += '<div class="contrarian-source">' + escapeHtml(e.contrarian.source) + '</div>';
                    html += '<h3><a href="' + escapeHtml(e.contrarian.url) + '" target="_blank" rel="noopener">' + escapeHtml(e.contrarian.title) + '</a></h3>';
                    if (e.contrarian.note) html += '<p class="contrarian-note">' + escapeHtml(e.contrarian.note) + '</p>';
                    html += '</div>';
                }

                if (e.also_worth && e.also_worth.length) {
                    html += '<div class="also-worth-wrap">';
                    html += '<p class="section-label">Also worth your time</p>';
                    html += '<div class="also-worth-list">';
                    e.also_worth.forEach(function(aw) {
                        html += '<div class="also-worth-item">';
                        html += '<a href="' + escapeHtml(aw.url) + '" target="_blank" rel="noopener">' + escapeHtml(aw.title) + '</a>';
                        if (aw.source) html += '<div class="also-worth-source">' + escapeHtml(aw.source) + '</div>';
                        html += '</div>';
                    });
                    html += '</div>';
                    html += '</div>';
                }

                if (e.pm_homework && e.pm_homework.length) {
                    html += '<div class="pm-homework-wrap">';
                    html += '<p class="section-label">PM homework</p>';
                    html += '<ul class="pm-homework-list">';
                    e.pm_homework.forEach(function(hw) {
                        html += '<li>' + escapeHtml(hw) + '</li>';
                    });
                    html += '</ul>';
                    html += '</div>';
                }

                html += '<div class="edition-footer">';
                html += 'Generated ' + formatDate(e.generated_at);
                if (e.model_used) html += ' - ' + escapeHtml(e.model_used);
                html += '</div>';

                document.getElementById('edition-content').innerHTML = html;
            })
            .catch(function() {
                document.getElementById('edition-content').innerHTML = '<div class="loading">Edition not found.</div>';
            });
    }
</script>
</body>
</html>
